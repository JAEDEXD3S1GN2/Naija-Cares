<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - Health Companion</title>
    <link rel="stylesheet" href="../styles.css" />
    <style>
      .contact-container {
        max-width: 1000px;
        margin: 40px auto;
        padding: 20px;
        background-color: #ffffff;
        border-radius: 12px;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
      }

      .contact-form h2,
      .map-container h2 {
        margin-bottom: 20px;
        color: #00796b;
      }

      form label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
      }

      form input,
      form textarea {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 1rem;
      }

      form button {
        background-color: #00bfa5;
        color: white;
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }

      form button:hover {
        background-color: #009e87;
      }

      .map-container iframe {
        width: 100%;
        height: 300px;
        border: none;
        border-radius: 8px;
      }

      @media (max-width: 768px) {
        .contact-container {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <h1>Contact Us</h1>
    </header>

    <main class="content">
      <section class="contact-container">
        <div class="contact-form">
          <h2>Get in Touch</h2>
          <form action="#" method="POST">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required />

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required />

            <label for="message">Your Message</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <button type="submit">Send Message</button>
          </form>
        </div>

        <div class="map-container">
          <h2>Our Location</h2>
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3151.835434509798!2d144.95373531584012!3d-37.816279842021316!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6ad65d43f1f47d49%3A0xf0172ab0e63c6a3e!2sMelbourne%20Central%2C%20Melbourne%20VIC%203000%2C%20Australia!5e0!3m2!1sen!2sau!4v1610000000000"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
          >
          </iframe>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>&copy; 2025 Health Companion. All rights reserved.</p>
    </footer>
  </body>
</html>
